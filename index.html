<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5ef" />
    <title>消費税 理論連想</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">消費税法</p>
          <h1>理論連想</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" aria-label="ホーム画面に追加">
          <span aria-hidden="true">＋</span>
        </button>
      </header>

      <main>
        <section class="search-panel" aria-labelledby="search-title">
          <h2 id="search-title">キーワード</h2>
          <div class="input-row">
            <input
              id="keywordInput"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="例：棚卸資産 免税事業者"
            />
            <button id="clearButton" class="icon-button" type="button" aria-label="入力を消す">
              <span aria-hidden="true">×</span>
            </button>
          </div>
          <div class="tag-area" id="tagArea" aria-label="よく使うキーワード"></div>
        </section>

        <nav class="tabs" aria-label="表示切替">
          <button class="tab-button active" data-view="results" type="button">連想</button>
          <button class="tab-button" data-view="quiz" type="button">練習</button>
          <button class="tab-button" data-view="library" type="button">一覧</button>
          <button class="tab-button" data-view="settings" type="button">追加</button>
        </nav>

        <section class="view active" id="resultsView" aria-live="polite">
          <div class="result-summary">
            <span id="matchCount">0件</span>
            <span id="activeTerms">キーワードを入力してください</span>
          </div>
          <div class="card-list" id="resultList"></div>
        </section>

        <section class="view" id="quizView">
          <div class="quiz-card">
            <div class="quiz-head">
              <p class="eyebrow">今日の確認</p>
              <button class="icon-button" id="nextQuizButton" type="button" aria-label="別の問題">
                <span aria-hidden="true">↻</span>
              </button>
            </div>
            <div class="quiz-terms" id="quizTerms"></div>
            <textarea id="quizMemo" rows="5" placeholder="思い出した規定・注意点をメモ"></textarea>
            <button id="showAnswerButton" class="primary-button" type="button">答えを見る</button>
            <div class="answer-area hidden" id="answerArea"></div>
          </div>
        </section>

        <section class="view" id="libraryView">
          <div class="toolbar">
            <button id="exportButton" class="secondary-button" type="button">書き出し</button>
            <label class="file-button">
              読み込み
              <input id="importInput" type="file" accept="application/json" />
            </label>
          </div>
          <div class="card-list" id="libraryList"></div>
        </section>

        <section class="view" id="settingsView">
          <form class="entry-form" id="entryForm">
            <label>
              キーワード
              <input id="termsField" type="text" placeholder="例：棚卸資産, 免税事業者" required />
            </label>
            <label>
              連想する規定・注意点
              <textarea
                id="pointsField"
                rows="5"
                placeholder="1行に1つずつ入力"
                required
              ></textarea>
            </label>
            <label>
              答案での注意
              <textarea id="noteField" rows="3" placeholder="任意"></textarea>
            </label>
            <button class="primary-button" type="submit">カードを保存</button>
          </form>
        </section>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="memory-card">
        <div class="card-top">
          <div class="term-list"></div>
          <button class="icon-button small delete-button" type="button" aria-label="カードを削除">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <ul class="point-list"></ul>
        <p class="note"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
